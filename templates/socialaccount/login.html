<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Confirm Google Sign In - Snacks Billing</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white p-10 rounded-xl shadow-2xl max-w-md w-full text-center">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">Almost there!</h1>
    
    <p class="text-lg text-gray-700 mb-8">
        You are signing in with <strong>{{ provider.name }}</strong>.
    </p>

    <form method="post" action="{{ action }}">
        {% csrf_token %}
        <button type="submit" class="w-full bg-blue-600 text-white py-3 px-6 rounded-lg font-semibold hover:bg-blue-700 transition">
            Continue to Snacks Billing
        </button>
    </form>

    <p class="mt-6 text-sm text-gray-600">
        <a href="{% url 'account_login' %}" class="text-blue-600 hover:underline">Back to login</a>
    </p>
</div>

</body>
</html>
